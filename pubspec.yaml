name: nyama_rider
description: "NYAMA Rider — App livreur/benskineur NYAMA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP client
  dio: ^5.4.0

  # Navigation
  go_router: ^14.0.0

  # WebSocket temps réel
  socket_io_client: ^3.0.0

  # Stockage sécurisé tokens
  flutter_secure_storage: ^9.0.0

  # GPS
  geolocator: ^12.0.0

  # Maps
  google_maps_flutter: ^2.6.0

  # Son perçant
  audioplayers: ^6.0.0

  # Vibration forte
  vibration: ^2.0.0

  # Skeleton loaders
  shimmer: ^3.0.0

  # Formatage FCFA et dates
  intl: ^0.20.2

  # Saisie OTP
  pin_code_fields: ^8.0.0

  # Appel téléphonique
  url_launcher: ^6.2.0

  # Note en étoiles
  flutter_rating_bar: ^4.0.0

  # SVG support
  flutter_svg: ^2.0.0

  # Images réseau
  cached_network_image: ^3.3.0

  # Partage
  share_plus: ^10.0.0

  # Image picker (photo profil)
  image_picker: ^1.1.0

  # Push notifications + auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.5.1
  firebase_messaging: ^15.1.3

  # Permissions (notifications, caméra...)
  permission_handler: ^11.3.1

  # Confettis (mission livrée)
  confetti: ^0.8.0

  # Localizations
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_nyama.jpg"
  adaptive_icon_background: "#F57C20"
  adaptive_icon_foreground: "assets/images/logo_nyama.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/images/mock/
    - assets/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Variable.ttf
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans-Variable.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
