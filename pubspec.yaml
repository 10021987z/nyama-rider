name: nyama_rider
description: "NYAMA Rider — App livreur/benskineur NYAMA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP client
  dio: ^5.4.0

  # Navigation
  go_router: ^14.0.0

  # WebSocket temps réel
  socket_io_client: ^3.0.0

  # Stockage sécurisé tokens
  flutter_secure_storage: ^9.0.0

  # GPS
  geolocator: ^12.0.0

  # Maps
  google_maps_flutter: ^2.6.0

  # Son perçant
  audioplayers: ^6.0.0

  # Vibration forte
  vibration: ^2.0.0

  # Skeleton loaders
  shimmer: ^3.0.0

  # Formatage FCFA et dates
  intl: ^0.19.0

  # Saisie OTP
  pin_code_fields: ^8.0.0

  # Appel téléphonique
  url_launcher: ^6.2.0

  # Note en étoiles
  flutter_rating_bar: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
